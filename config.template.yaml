# Clash Verge / Mihomo cloud template
# Safe to host on GitHub. Do not commit private subscription URLs.

port: 7890
socks-port: 7891
mixed-port: 7897
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true
external-controller: 127.0.0.1:9090

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "localhost"
    - "*.srv.nintendo.net"
    - "*.stun.playstation.net"
    - "xbox.*.microsoft.com"
    - "*.xboxlive.com"
    - "*.battlenet.com.cn"
    - "*.battlenet.com"
    - "*.blzstatic.cn"
    - "*.battle.net"

proxy-providers:
  订阅代理:
    type: http
    url: "" # Sub-Store 或 Clash/Mihomo 订阅链接由你在云端/客户端填写
    interval: 86400
    path: ./providers/subscription.yaml
    health-check:
      enable: true
      interval: 300
      url: http://www.google.com/generate_204

